// ─── INIT ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (state.tab === 'shots' || state.tab === 'storyboard' || state.tab === 'script') render();
});


// ─── PASSWORD GATE ───────────────────────────────────────────────────────
// 修改密碼：把下面的字串改成你想要的密碼
const CREW_PASSWORD = 'corsa2025';
const PW_SESSION_KEY = 'prod:auth:v1';

async function hashStr(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// 記住登入天數（0 = 不記住，每次都要輸入）
const REMEMBER_DAYS = 30;

async function initPasswordGate() {
  const screen = document.getElementById('pw-screen');
  const input  = document.getElementById('pw-input');
  const btn    = document.getElementById('pw-btn');
  const err    = document.getElementById('pw-err');

  const correctHash = await hashStr(CREW_PASSWORD);

  // Check localStorage for saved auth
  function isAuthed() {
    if (REMEMBER_DAYS === 0) return false;
    try {
      const raw = localStorage.getItem(PW_SESSION_KEY);
      if (!raw) return false;
      const { hash, expires } = JSON.parse(raw);
      return hash === correctHash && Date.now() < expires;
    } catch(e) { return false; }
  }

  function saveAuth(hash) {
    if (REMEMBER_DAYS === 0) return;
    const expires = Date.now() + REMEMBER_DAYS * 24 * 60 * 60 * 1000;
    localStorage.setItem(PW_SESSION_KEY, JSON.stringify({ hash, expires }));
  }

  // Already authenticated
  if (isAuthed()) { screen.remove(); initApp(); return; }

  screen.style.display = 'flex';

  async function attempt() {
    const h = await hashStr(input.value);
    if (h === correctHash) {
      saveAuth(h);
      screen.style.opacity = '0';
      screen.style.transition = 'opacity .3s';
      setTimeout(() => { screen.remove(); initApp(); }, 300);
    } else {
      err.classList.add('show');
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => { input.classList.remove('shake'); err.classList.remove('show'); }, 2000);
    }
  }

  btn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if(e.key==='Enter') attempt(); });
  input.focus();
}

// ─── PROFILE ─────────────────────────────────────────────────────────────
const PROFILE_KEY = 'prod:profile:v1';
let userProfile = { name: '', dept: '', isAdmin: false };

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (raw) userProfile = JSON.parse(raw);
  } catch(e) {}
}

function saveProfile(name, dept) {
  userProfile = { ...userProfile, name, dept };
  localStorage.setItem(PROFILE_KEY, JSON.stringify(userProfile));
  updateProfileUI();
}

function updateProfileUI() {
  const { name, dept } = userProfile;
  const initial = name ? name[0].toUpperCase() : '?';
  // Sidebar
  const av = document.getElementById('profile-avatar');
  const nl = document.getElementById('profile-name-lbl');
  const rl = document.getElementById('profile-role-lbl');
  if (av) av.textContent = initial;
  if (nl) nl.textContent = name || '設定個人資訊';
  if (rl) rl.innerHTML = (dept || '點此設定') + (userProfile.isAdmin ? '<span class="admin-badge">管理員</span>' : '');
  // Topbar
  const tav = document.getElementById('topbar-avatar');
  if (tav) tav.textContent = initial;
}

function showProfileScreen() {
  const screen = document.getElementById('profile-screen');
  const nameInp = document.getElementById('profile-name-inp');
  nameInp.value = userProfile.name || '';
  // Restore selected dept
  document.querySelectorAll('.dept-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.dept === userProfile.dept);
  });
  screen.classList.add('show');
  nameInp.focus();
}

function hideProfileScreen() {
  document.getElementById('profile-screen').classList.remove('show');
}

// Dept button selection
document.getElementById('dept-grid').addEventListener('click', e => {
  const btn = e.target.closest('.dept-btn');
  if (!btn) return;
  document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
});

// Confirm profile
document.getElementById('profile-confirm').addEventListener('click', () => {
  const name = document.getElementById('profile-name-inp').value.trim();
  const dept = document.querySelector('.dept-btn.selected')?.dataset.dept || '';
  if (!name) { document.getElementById('profile-name-inp').focus(); return; }
  saveProfile(name, dept);
  hideProfileScreen();
});

// Profile name input enter key
document.getElementById('profile-name-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('profile-confirm').click();
});

// Edit profile on click
document.getElementById('profile-badge')?.addEventListener('click', showProfileScreen);
document.getElementById('topbar-profile')?.addEventListener('click', showProfileScreen);

let onlineUsers = [];

async function registerHeartbeat() {
  if (!userProfile.name || !firebaseUrl) return;
  try {
    const key = userProfile.name.replace(/[^a-zA-Z0-9]/g,'_');
    await fetch(firebaseUrl+'/online/'+key+'.json', {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name:userProfile.name, dept:userProfile.dept||'', isAdmin:userProfile.isAdmin||false, ts:Date.now() }),
    });
  } catch {}
}

async function fetchOnlineUsers() {
  if (!firebaseUrl) return;
  try {
    const r = await fetch(firebaseUrl+'/online.json');
    const data = await r.json();
    if (!data) { onlineUsers=[]; return; }
    const now = Date.now();
    onlineUsers = Object.values(data).filter(u => now-(u.ts||0)<90000);
  } catch { onlineUsers=[]; }
}

function initApp() {
  loadProfile();
  loadLocal();
  render();
  updateSyncUI();
  updateProfileUI();
  setInterval(pullFirebase, 4000);
  pullFirebase();
  requestNotificationPermission();
  if (!userProfile.name) { setTimeout(showProfileSetup, 400); }
  registerHeartbeat();
  setInterval(registerHeartbeat, 30000);
}

initPasswordGate();
